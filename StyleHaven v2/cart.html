<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StyleHaven | Cart</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
 
<header>
  <nav class="navbar">
    <a href="index.html" class="logo">
      <span class="style-red">STYLE</span><span class="haven-black">HAVEN</span>
    </a>
    <div class="menu-toggle" id="menu-toggle">
      <i class="fas fa-bars"></i>
    </div>
    <ul class="nav-links" id="nav-links">
      <li><a href="shop.html" class="underline-effect"><i class="fas fa-store"></i></a></li>
      <li><a href="wishlist.html" class="underline-effect"><i class="fas fa-heart"></i></a></li>
      <li><a href="cart.html" class="underline-effect"><i class="fas fa-shopping-cart"></i></a></li>
      <li class="profile-menu" id="profileMenu">
        <a href="#" id="profileToggle" class="underline-effect"><i class="fas fa-user"></i></a>
        <ul class="dropdown" id="profileDropdown">
          <li><a href="profile.html">My Profile</a></li>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="settings.html">Settings</a></li>
          <li><a href="#" id="logoutLink">Logout</a></li>
        </ul>
      </li>
      <li id="loginNav"><a href="login.html" class="underline-effect">Login</a></li>
    </ul>
  </nav>
</header>


  <section class="cart-section">
    <h1>Your Cart</h1>
    <div class="cart-container" id="cartContainer">
      <!-- Items will be dynamically inserted here -->
    </div>
    <div class="cart-summary">
      <h3>Total: $<span id="totalPrice">0.00</span></h3>
      <a href="checkout.html" class="btn">Proceed to Checkout</a>
    </div>
  </section>


  <script>
    // Mobile menu toggle
    document.getElementById("menu-toggle").addEventListener("click", () => {
      document.getElementById("nav-links").classList.toggle("show");
    });
  
    // Auth-based nav links
    const token = localStorage.getItem('token');
    const profileMenu = document.getElementById('profileMenu');
    const loginNav = document.getElementById('loginNav');
    if (token) {
      profileMenu.style.display = 'inline-block';
      loginNav.style.display = 'none';
    } else {
      profileMenu.style.display = 'none';
      loginNav.style.display = 'inline-block';
    }
  
    // Profile dropdown toggle
    document.getElementById('profileToggle').addEventListener('click', (e) => {
      e.preventDefault();
      profileMenu.classList.toggle('active');
    });
  
    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      if (!profileMenu.contains(e.target)) {
        profileMenu.classList.remove('active');
      }
    });
  
    // Logout
    document.getElementById('logoutLink').addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.removeItem('token');
      window.location.href = 'index.html';
    });
  
  

    // Sample cart items
    const cartItems = [
      { name: "Classic White Tee", price: 25.00, image: "images/product3.jpg", quantity: 1 },
      { name: "Sporty Sneakers", price: 45.00, image: "images/product5.jpg", quantity: 2 }
    ];

    const cartContainer = document.getElementById("cartContainer");
    const totalPriceElement = document.getElementById("totalPrice");

    function renderCart() {
      cartContainer.innerHTML = "";
      let total = 0;
      cartItems.forEach((item, index) => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        cartContainer.innerHTML += `
          <div class="cart-item">
            <img src="${item.image}" alt="${item.name}" />
            <div class="item-details">
              <h3>${item.name}</h3>
              <p>Price: $${item.price.toFixed(2)}</p>
              <p>Quantity: <input type="number" min="1" value="${item.quantity}" data-index="${index}" class="qty-input"></p>
              <button class="remove-btn" data-index="${index}">Remove</button>
            </div>
          </div>
        `;
      });
      totalPriceElement.textContent = total.toFixed(2);
    }

    cartContainer.addEventListener("input", e => {
      if (e.target.classList.contains("qty-input")) {
        const idx = e.target.getAttribute("data-index");
        cartItems[idx].quantity = parseInt(e.target.value);
        renderCart();
      }
    });

    cartContainer.addEventListener("click", e => {
      if (e.target.classList.contains("remove-btn")) {
        const idx = e.target.getAttribute("data-index");
        cartItems.splice(idx, 1);
        renderCart();
      }
    });

    renderCart();
  </script>
</body>
</html>
