<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StyleHaven | Checkout</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f9f9f9;
      color: #333;
    }
    .profile-menu {
      position: relative;
      display: inline-block;
    }
    .profile-menu .dropdown {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      background-color: #fff;
      border: 1px solid #ddd;
      min-width: 160px;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .profile-menu.active .dropdown {
      display: block;
    }
    .profile-menu .dropdown li {
      list-style: none;
      padding: 10px;
    }
    .profile-menu .dropdown li a {
      text-decoration: none;
      color: #333;
      display: block;
    }
    .profile-menu .dropdown li a:hover {
      background-color: #f1f1f1;
    }
    .checkout-container {
      max-width: 1200px;
      margin: 3rem auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      padding: 2rem;
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #e63946;
    }
    .checkout-form label {
      display: block;
      margin-bottom: 0.25rem;
      font-weight: 600;
    }
    .checkout-form input {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1.5rem;
      border: 1px solid #ccc;
      border-radius: 0.5rem;
      font-family: 'Poppins', sans-serif;
    }
    .order-summary {
      background-color: #fefefe;
      padding: 2rem;
      border-radius: 0.75rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.04);
    }
    .order-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .order-total {
      border-top: 1px solid #ddd;
      margin-top: 2rem;
      padding-top: 1rem;
      font-size: 1.25rem;
      font-weight: bold;
      color: #e63946;
    }
    .checkout-btn {
      width: 100%;
      padding: 0.75rem;
      background-color: #e63946;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
      margin-top: 1rem;
    }
    .checkout-btn:hover {
      background-color: #d62839;
    }
    @media (max-width: 768px) {
      .checkout-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="index.html" class="logo">
        <span class="style-red">STYLE</span><span class="haven-black">HAVEN</span>
      </a>
      <div class="menu-toggle" id="menu-toggle">
        <i class="fas fa-bars"></i>
      </div>
      <ul class="nav-links" id="nav-links">
        <li><a href="shop.html" class="underline-effect"><i class="fas fa-store"></i></a></li>
        <li><a href="wishlist.html" class="underline-effect"><i class="fas fa-heart"></i></a></li>
        <li><a href="cart.html" class="underline-effect"><i class="fas fa-shopping-cart"></i></a></li>
        <li class="profile-menu" id="profileMenu">
          <a href="#" id="profileToggle" class="underline-effect"><i class="fas fa-user"></i></a>
          <ul class="dropdown" id="profileDropdown">
            <li><a href="profile.html">My Profile</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="settings.html">Settings</a></li>
            <li><a href="#" id="logoutLink">Logout</a></li>
          </ul>
        </li>
        <li id="loginNav"><a href="login.html" class="underline-effect">Login</a></li>
      </ul>
    </nav>
  </header>
  

  <main class="checkout-container">
    <!-- Left: Billing Form -->
    <div class="checkout-form">
      <h2>Billing Details</h2>
      <form id="billingForm">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" required>

        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="address">Address</label>
        <input type="text" id="address" required>

        <label for="city">City</label>
        <input type="text" id="city" required>

        <label for="zip">ZIP Code</label>
        <input type="text" id="zip" required>

        <label for="card">Card Number</label>
        <input type="text" id="card" maxlength="16" placeholder="•••• •••• •••• ••••" required>

        <button type="submit" class="checkout-btn">Place Order</button>
      </form>
    </div>

    <!-- Right: Order Summary -->
    <div class="order-summary">
      <h2>Order Summary</h2>
      <div id="orderItems"></div>
      <div class="order-total">Total: <span id="orderTotal">0.00</span></div>
    </div>
  </main>

  <script>
    const conversionRates = { USD: 1, EUR: 0.90, INR: 80 };

    function formatPrice(price) {
      const currency = localStorage.getItem('currency') || 'USD';
      const rate = conversionRates[currency] || 1;
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency
      }).format(price * rate);
    }

    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const orderItems = document.getElementById("orderItems");
    const orderTotal = document.getElementById("orderTotal");

    let total = 0;
    cart.forEach(item => {
      const itemTotal = item.price * item.quantity;
      total += itemTotal;
      const div = document.createElement("div");
      div.classList.add("order-item");
      div.innerHTML = `
        <span>${item.name} x${item.quantity}</span>
        <span>${formatPrice(itemTotal)}</span>
      `;
      orderItems.appendChild(div);
    });

    orderTotal.textContent = formatPrice(total);

    document.getElementById("billingForm").addEventListener("submit", function(e) {
      e.preventDefault();
      alert("Order placed successfully!");
      localStorage.removeItem("cart");
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
