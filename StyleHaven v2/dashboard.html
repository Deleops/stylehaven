<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - StyleHaven</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">
      <a href="index.html">StyleHaven</a>
    </div>
    <div class="menu-toggle" id="menu-toggle">
      <i class="fas fa-bars"></i>
    </div>
    <div class="nav-links" id="nav-links">
      <a href="dashboard.html" class="underline-effect">Dashboard</a>
      <a href="shop.html" class="underline-effect">Shop</a>
      <a href="wishlist.html" class="underline-effect">Wishlist</a>
      <a href="cart.html" class="underline-effect">Cart</a>
      <a href="profile.html" class="underline-effect">Profile</a>
      <a href="#" class="underline-effect" id="logoutBtn">Logout</a>
      <a href="login.html" class="underline-effect" id="loginNav">Login</a>
    </div>
  </nav>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="manage-products.html">Manage Products</a></li>
      <li><a href="orders.html">Orders</a></li>
      <li><a href="settings.html">Settings</a></li>
    </ul>
  </div>

  <!-- Main Content -->
  <main>
    <section class="overview">
      <div class="overview-item">
        <h3>Total Sales</h3>
        <p>$10,000</p>
      </div>
      <div class="overview-item">
        <h3>Total Users</h3>
        <p>500</p>
      </div>
      <div class="overview-item">
        <h3>Total Products</h3>
        <p>150</p>
      </div>
    </section>

    <section class="product-management">
      <h2>Manage Products</h2>
      <button class="add-product-btn">Add New Product</button>
      <table>
        <thead>
          <tr>
            <th>Product Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Product 1</td>
            <td>$50</td>
            <td>20</td>
            <td>
              <button class="edit-btn">Edit</button>
              <button class="delete-btn">Delete</button>
            </td>
          </tr>
          <tr>
            <td>Product 2</td>
            <td>$30</td>
            <td>15</td>
            <td>
              <button class="edit-btn">Edit</button>
              <button class="delete-btn">Delete</button>
            </td>
          </tr>
          <!-- More products -->
        </tbody>
      </table>
    </section>
  </main>

  <script>
    // Sidebar toggle for mobile
    document.getElementById("menu-toggle").addEventListener("click", function() {
      document.getElementById("sidebar").classList.toggle("active");
    });

    // Auth check
    const token = localStorage.getItem("token");
    const loginNav = document.getElementById("loginNav");
    const logoutBtn = document.getElementById("logoutBtn");

    if (!token) {
      alert("Please login first.");
      window.location.href = "/login.html";
    } else {
      loginNav.style.display = "none";
      logoutBtn.style.display = "inline-block";
    }

    // Logout
    logoutBtn.addEventListener("click", function(e) {
      e.preventDefault();
      localStorage.removeItem("token");
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
