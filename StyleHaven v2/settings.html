<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StyleHaven | Settings</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- NAVBAR -->
  <header>
    <nav class="navbar">
      <a href="index.html" class="logo">
        <span class="style-red">STYLE</span><span class="haven-black">HAVEN</span>
      </a>
      <div class="menu-toggle" id="menu-toggle">
        <i class="fas fa-bars"></i>
      </div>
      <ul class="nav-links" id="nav-links">
        <li><a href="shop.html" class="underline-effect"><i class="fas fa-store"></i></a></li>
        <li><a href="wishlist.html" class="underline-effect"><i class="fas fa-heart"></i></a></li>
        <li><a href="cart.html" class="underline-effect"><i class="fas fa-shopping-cart"></i></a></li>
        <li class="profile-menu" id="profileMenu">
          <a href="#" id="profileToggle" class="underline-effect"><i class="fas fa-user"></i></a>
          <ul class="dropdown" id="profileDropdown">
            <li><a href="profile.html">My Profile</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="settings.html">Settings</a></li>
            <li><a href="#" id="logoutLink">Logout</a></li>
          </ul>
        </li>
        <li id="loginNav"><a href="login.html" class="underline-effect">Login</a></li>
      </ul>
    </nav>
  </header>

  <!-- SETTINGS -->
  <main class="settings-section">
    <h1>Preferences</h1>
    <form class="settings-form">
      <!-- Dark Mode -->
      <div class="form-group">
        <label for="darkModeToggle">Enable Dark Mode</label>
        <input type="checkbox" id="darkModeToggle" />
      </div>

      <!-- Currency -->
      <div class="form-group">
        <label for="currencySelect">Preferred Currency</label>
        <select id="currencySelect">
          <option value="USD">$ - USD</option>
          <option value="EUR">€ - EUR</option>
          <option value="INR">₹ - INR</option>
          <option value="GBP">£ - GBP</option>
        </select>
      </div>

      <!-- Notifications -->
      <div class="form-group">
        <label for="notificationsToggle">Enable Notifications</label>
        <input type="checkbox" id="notificationsToggle" />
      </div>

      <div class="form-group">
        <button type="submit" class="btn">Save Preferences</button>
      </div>
    </form>
  </main>

  <script>
    // Toggle Mobile Menu
    document.getElementById("menu-toggle").addEventListener("click", () => {
      document.getElementById("nav-links").classList.toggle("show");
    });

    // Auth Display
    const token = localStorage.getItem('token');
    const profileMenu = document.getElementById('profileMenu');
    const loginNav = document.getElementById('loginNav');
    if (token) {
      profileMenu.style.display = 'inline-block';
      loginNav.style.display = 'none';
    } else {
      profileMenu.style.display = 'none';
      loginNav.style.display = 'inline-block';
    }

    // Profile Dropdown
    const profileToggle = document.getElementById('profileToggle');
    profileToggle.addEventListener('click', (e) => {
      e.preventDefault();
      profileMenu.classList.toggle('active');
    });
    document.addEventListener('click', (e) => {
      if (!profileMenu.contains(e.target)) {
        profileMenu.classList.remove('active');
      }
    });

    // Logout
    document.getElementById('logoutLink').addEventListener('click', e => {
      e.preventDefault();
      localStorage.removeItem('token');
      window.location.href = 'index.html';
    });

    // Apply Settings
    const darkModeToggle = document.getElementById('darkModeToggle');
    const currencySelect = document.getElementById('currencySelect');
    const notificationsToggle = document.getElementById('notificationsToggle');

    function applyPreferences() {
      const theme = localStorage.getItem('theme') || 'light';
      document.body.classList.toggle('dark-mode', theme === 'dark');
      if (darkModeToggle) darkModeToggle.checked = theme === 'dark';

      const currency = localStorage.getItem('currency') || 'USD';
      if (currencySelect) currencySelect.value = currency;

      const notifications = localStorage.getItem('notifications') === 'true';
      if (notificationsToggle) notificationsToggle.checked = notifications;
    }

    applyPreferences();

    // Save Settings
    document.querySelector('.settings-form').addEventListener('submit', (e) => {
      e.preventDefault();
      localStorage.setItem('theme', darkModeToggle.checked ? 'dark' : 'light');
      localStorage.setItem('currency', currencySelect.value);
      localStorage.setItem('notifications', notificationsToggle.checked);

      applyPreferences();

      alert("Preferences saved!");
    });
  </script>
</body>
</html>
