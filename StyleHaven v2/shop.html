<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StyleHaven | Shop</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f9f9f9;
      color: #333;
    }
    .shop-header {
      text-align: center;
      padding: 3rem 1rem 2rem;
    }
    .shop-header h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    #searchInput {
      padding: 0.75rem 1.25rem;
      width: 60%;
      max-width: 500px;
      border: 1px solid #ccc;
      border-radius: 2rem;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .product-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 2rem;
  padding: 2rem;
  max-width: 1200px;
  margin: 0 auto;

  /* new: center any items (so single cards sit in the middle) */
  justify-content: center;
  justify-items: center;
}

.product-card {
  /* new: prevent the card itself from growing beyond a reasonable width */
  width: 100%;
  max-width: 300px;
}

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    .product-card img {
      width: 100%;
      max-width: 300px;
      height: 400px;
      object-fit: cover;
      border-radius: 0.5rem;
    }
    .product-card h3 {
      margin-top: 1rem;
      font-size: 1.25rem;
    }
    .product-card p {
      font-size: 1.1rem;
      margin: 0.5rem 0;
      color: #e63946;
    }
    .product-card button {
      margin: 0.25rem 0.5rem 0 0;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 1.5rem;
      background: #e63946;
      color: white;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .product-card button:hover {
      background: #d62839;
    }
    .product-card .wishlist {
      background: transparent;
      border: 1px solid #e63946;
      color: #e63946;
    }
    .product-card .wishlist:hover {
      background: #e63946;
      color: white;
    }
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100vw;
      min-height: 100vh;
      object-fit: cover;
      z-index: -1;
      opacity: 0.25;
    }
  </style>
</head>
<body>
<header>
  <nav class="navbar">
    <a href="index.html" class="logo">
      <span class="style-red">STYLE</span><span class="haven-black">HAVEN</span>
    </a>
    <div class="menu-toggle" id="menu-toggle">
      <i class="fas fa-bars"></i>
    </div>
    <ul class="nav-links" id="nav-links">
      <li><a href="shop.html"><i class="fas fa-store"></i></a></li>
      <li><a href="wishlist.html"><i class="fas fa-heart"></i></a></li>
      <li><a href="cart.html"><i class="fas fa-shopping-cart"></i></a></li>
      <li class="profile-menu" id="profileMenu">
        <a href="#" id="profileToggle"><i class="fas fa-user"></i></a>
        <ul class="dropdown" id="profileDropdown">
          <li><a href="profile.html">My Profile</a></li>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="settings.html">Settings</a></li>
          <li><a href="#" id="logoutLink">Logout</a></li>
        </ul>
      </li>
      <li id="loginNav"><a href="login.html">Login</a></li>
    </ul>
  </nav>
</header>
<section class="shop-section">
  <div class="shop-header">
    <h1>Shop Our Collection</h1>
    <input type="text" id="searchInput" placeholder="Search products...">
  </div>
  <div class="product-list" id="productList"></div>
</section>
<script>
  const products = [
    { name: "Classic White Tee", price: 25, image: "cwt.jpg" },
    { name: "Blue Denim Jacket", price: 70, image: "bdj.jpg" },
    { name: "Sporty Sneakers", price: 45, image: "ss.jpg" },
    { name: "Boho Summer Dress", price: 55, image: "bsd.jpg" }
  ];

  const productList = document.getElementById("productList");
  const searchInput = document.getElementById("searchInput");
  let filteredProducts = products;

  function isInWishlist(name) {
    const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
    return wishlist.some(item => item.name === name);
  }

  function toggleWishlist(name) {
    let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
    const product = products.find(p => p.name === name);
    const index = wishlist.findIndex(item => item.name === name);

    if (index > -1) {
      wishlist.splice(index, 1);
    } else {
      wishlist.push(product);
    }

    localStorage.setItem('wishlist', JSON.stringify(wishlist));
    displayProducts(filteredProducts);
  }

  function addToCart(name) {
  const product = products.find(p => p.name === name);
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  const existing = cart.find(item => item.name === name);

  if (existing) {
    existing.quantity += 1;
  } else {
    cart.push({ ...product, quantity: 1 });
  }

  localStorage.setItem('cart', JSON.stringify(cart));
  alert(`${name} added to cart!`);
}

  function displayProducts(items) {
    productList.innerHTML = "";
    items.forEach(p => {
      const isWishlisted = isInWishlist(p.name);
      productList.innerHTML += `
        <div class="product-card">
          <img src="${p.image}" alt="${p.name}" />
          <h3>${p.name}</h3>
          <p>$${p.price.toFixed(2)}</p>
          <button onclick="addToCart('${p.name}')">Add to Cart</button>
          <button class="wishlist" onclick="toggleWishlist('${p.name}')">
            <i class="${isWishlisted ? 'fas' : 'far'} fa-heart ${isWishlisted ? 'wishlisted' : ''}"></i>
          </button>
        </div>
      `;
    });
  }

  // Initial render
  displayProducts(products);

  // Live search
  searchInput.addEventListener("input", () => {
    const val = searchInput.value.toLowerCase();
    filteredProducts = products.filter(p => p.name.toLowerCase().includes(val));
    displayProducts(filteredProducts);
  });

  // Navbar menu toggle
  document.getElementById("menu-toggle").addEventListener("click", () => {
    document.getElementById("nav-links").classList.toggle("show");
  });

  // Profile and login visibility
  const token = localStorage.getItem('token');
  const profileMenu = document.getElementById('profileMenu');
  const loginNav = document.getElementById('loginNav');
  if (token) {
    profileMenu.style.display = 'inline-block';
    loginNav.style.display = 'none';
  } else {
    profileMenu.style.display = 'none';
    loginNav.style.display = 'inline-block';
  }

  // Dropdown toggle
  document.getElementById('profileToggle').addEventListener('click', (e) => {
    e.preventDefault();
    profileMenu.classList.toggle('active');
  });

  document.addEventListener('click', (e) => {
    if (!profileMenu.contains(e.target)) {
      profileMenu.classList.remove('active');
    }
  });

  document.getElementById('logoutLink').addEventListener('click', (e) => {
    e.preventDefault();
    localStorage.removeItem('token');
    window.location.href = 'index.html';
  });
</script>

<video autoplay muted id="bg-video">
  <source src="shopbg.mp4" type="video/mp4">
  Your browser does not support HTML5 video.
</video>
</body>
</html>
