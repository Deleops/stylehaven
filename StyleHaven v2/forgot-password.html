<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Forgot Password | StyleHaven</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(to right, #ffe5e5, #ffffff);
      display: flex; align-items: center; justify-content: center;
      height: 100vh; margin: 0;
    }
    .form-container {
      position: relative;
      background: #fff; padding: 3rem; max-width: 400px; width: 100%;
      border-radius: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }
    .form-container h2 {
      color: #ff5a5f; margin-bottom: 1.5rem;
    }
    .form-container input {
      width: 100%; padding: .75rem; margin: .5rem 0;
      border: 1px solid #ddd; border-radius: .75rem;
    }
    .form-container button {
      width: 100%; padding: .75rem; margin-top: 1rem;
      background: #ff5a5f; color: #fff; font-weight: 600;
      border: none; border-radius: 2rem; cursor: pointer;
      transition: background .3s;
    }
    .form-container button:hover {
      background: #e14b4f;
    }
    .form-container a {
      display: block; margin-top: 1rem; color: #333;
      font-size: .9rem; text-decoration: none;
    }
    .form-container a:hover {
      color: #ff5a5f;
    }
    .back-btn {
      position: absolute; top: 20px; left: 20px;
      background: none; color: #333; border: 2px solid #ff5a5f;
      padding: .4rem 1rem; border-radius: 30px; font-size: .9rem;
      cursor: pointer; transition: .3s;
    }
    .back-btn:hover {
      background: #ff5a5f; color: #fff;
    }
    #fpMessage {
      margin-top: 1rem; font-size: .9rem; color: #333;
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="location.href='login.html'">
    ← Back to Login
  </button>

  <div class="form-container">
    <h2>Reset Password</h2>
    <form id="fpForm">
      <input type="email" id="email" placeholder="Enter your email" required />
      <button type="submit">Send Reset Link</button>
    </form>
    <p id="fpMessage"></p>
    <a href="signup.html">Don't have an account? Sign Up</a>
  </div>

  <script>
    document.getElementById('fpForm').addEventListener('submit', async e => {
      e.preventDefault();
      const em = document.getElementById('email').value;
      const msg = document.getElementById('fpMessage');

      try {
        const res = await fetch('http://localhost:5000/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: em })
        });
        const data = await res.json();
        msg.textContent = res.ok
          ? 'If that email exists, a reset link has been sent.'
          : data.message || 'Request failed.';
      } catch {
        msg.textContent = 'Server error. Try again.';
      }
    });
  </script>
</body>
</html>
